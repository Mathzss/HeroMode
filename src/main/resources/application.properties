# Conexao MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/heromode
spring.datasource.username=heromode
spring.datasource.password=heromode

# Driver e Dialeto
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=heromode-super-secret-key-2024-must-be-at-least-256-bits-long
jwt.expiration=86400000